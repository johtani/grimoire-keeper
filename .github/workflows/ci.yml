name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: ruff format check
        run: uv run ruff format --check .

      - name: ruff lint
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy .

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run unit tests
        run: uv run pytest apps/api/tests/unit/ -v

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      weaviate:
        image: cr.weaviate.io/semitechnologies/weaviate:1.33.1
        ports:
          - "8080:8080"
        env:
          QUERY_DEFAULTS_LIMIT: 25
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
          PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
          DEFAULT_VECTORIZER_MODULE: "text2vec-openai"
          ENABLE_MODULES: "text2vec-openai"
          CLUSTER_HOSTNAME: "node1"
        options: >-
          --health-cmd "wget -qO- http://localhost:8080/v1/.well-known/ready || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run integration tests
        env:
          WEAVIATE_HOST: localhost
          WEAVIATE_PORT: 8080
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run pytest apps/api/tests/integration/ -v
